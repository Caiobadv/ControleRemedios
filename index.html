        return Object.keys(grouped)

            const [yearA, monthA, dayA] = a.split('-').map(Number);
            const [yearB, monthB, dayB] = b.split('-').map(Number);
            
            const dateA = new Date(yearA, monthA, dayA);
            const dateB = new Date(yearB, monthB, dayB);
            
            return dateB - dateA;
          })
          .reduce((result, key) => {
            result[key] = grouped[key];

          date.getMonth() === today.getMonth() &&
          date.getFullYear() === today.getFullYear()

// Checar doses "vencidas agora" e disparar lembrete (enquanto o app estiver aberto)
React.useEffect(() => {
  if (!remindersEnabled) return;
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;

  const checkDue = () => {
    const now = new Date();
    const meds = medsRef.current || [];

    meds.forEach((m) => {
      if (!m.nextDue) return;

      const due = new Date(m.nextDue);
      const diff = now - due;

      // janela de 1 minuto após o horário da dose
      const shouldNotify = diff >= 0 && diff < 60 * 1000;
      if (!shouldNotify) return;

      if (m.lastNotified === m.nextDue) return;

      // Atualizar marca de notificação para não repetir
      setMedications(prev =>
        prev.map(pm => pm.id === m.id ? { ...pm, lastNotified: m.nextDue } : pm)
      );

      // Toast interno
      showNotification(`Hora do remédio: ${m.name} (${m.dosage})`);

      // Notificação do navegador
      try {
        new Notification('Hora do remédio 💊', {
          body: `${m.name} — ${m.dosage}`,
          icon: '/icon-192.svg'
        });
      } catch (e) {
        // silencioso
      }
    });
  };

  checkDue();
  const id = setInterval(checkDue, 30 * 1000);
  return () => clearInterval(id);
}, [remindersEnabled]);

// Exportar lembretes para o Calendário do celular (.ics) — funciona mesmo com o site fechado
const downloadCalendarIcs = () => {
  const meds = medications || [];
  const now = new Date();
  const horizon = new Date(now);
  horizon.setDate(horizon.getDate() + 30);

  const pad = (n) => String(n).padStart(2, '0');
  const fmtICS = (d) => (
    `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`
  );

  const parseFrequencyToMinutes = (med) => {
    if (med.customSchedule) return 12 * 60; // 12h fixo (manhã/noite)
    if (!med.frequency) return null;

    const f = med.frequency.toLowerCase();
    const numMatch = f.match(/\d+/);
    const n = numMatch ? parseInt(numMatch[0], 10) : null;
    if (!n) return null;

    if (f.includes('hora')) return n * 60;
    if (f.includes('dia')) return n * 24 * 60;
    if (f.includes('semana')) return n * 7 * 24 * 60;
    if (f.includes('mês') || f.includes('mes')) return n * 30 * 24 * 60; // aproximação
    return null;
  };

  let events = '';
  let total = 0;

  meds.forEach((m) => {
    if (!m.nextDue) return;

    const intervalMin = parseFrequencyToMinutes(m);
    if (!intervalMin) return;

    let d = new Date(m.nextDue);

    // Se já passou muito, começar "agora" arredondando para o próximo intervalo
    if (d < now) d = new Date(now);

    // Gerar ocorrências até 30 dias (limite de segurança)
    let guard = 0;
    while (d <= horizon && guard < 500 && total < 800) {
      const dtStart = new Date(d);
      const dtEnd = new Date(d);
      dtEnd.setMinutes(dtEnd.getMinutes() + 5);

      const uid = `${m.id}-${dtStart.getTime()}@controle-remedios`;
      const summary = `Tomar ${m.name} (${m.dosage})`;

      events += [
        'BEGIN:VEVENT',
        `UID:${uid}`,
        `DTSTAMP:${fmtICS(now)}`,
        `DTSTART:${fmtICS(dtStart)}`,
        `DTEND:${fmtICS(dtEnd)}`,
        `SUMMARY:${summary}`,
        `DESCRIPTION:Hora do remédio — ${m.name} (${m.dosage}).`,
        'BEGIN:VALARM',
        'ACTION:DISPLAY',
        'DESCRIPTION:Lembrete de medicamento',
        'TRIGGER:-PT10M',
        'END:VALARM',
        'END:VEVENT'
      ].join('\r\n') + '\r\n';

      total += 1;
      guard += 1;

      d = new Date(d.getTime() + intervalMin * 60 * 1000);
    }
  });

  if (!events) {
    showNotification('Não encontrei horários (próxima dose) para exportar.');
    return;
  }

  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//ControleRemedios//PT-BR//',
    'CALSCALE:GREGORIAN',
    events.trim(),
    'END:VCALENDAR'
  ].join('\r\n');

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = 'lembretes-medicamentos.ics';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);

  showNotification('Arquivo de calendário gerado ✅ (importe no celular).');

                        <p><strong>Programação Personalizada (a cada 12 horas):</strong></p>
                        {medication.morningDose > 0 && (
                          <div style={styles.dosageTime}>
                            Manhã: {formatDose(medication.morningDose)} comprimido{medication.morningDose !== 1 ? 's' : ''}
                          </div>
                        )}
                        {medication.eveningDose > 0 && (
                          <div style={styles.dosageTime}>
                            Noite: {formatDose(medication.eveningDose)} comprimido{medication.eveningDose !== 1 ? 's' : ''}
                          </div>
                        )}
                      </div>
                    ) : (
                      <p><strong>Frequência:</strong> {medication.frequency}</p>
                    )}
                    
                    <p>
                      <strong>Estoque:</strong> 
                      <span style={isLowStock(medication) ? styles.lowStock : {}}>
                        {formatDose(medication.stock)} unidades
                        {isLowStock(medication) && ' (Estoque Baixo)'}
                      </span>
                    </p>
                    <p><strong>Última vez tomado:</strong> {formatDate(medication.lastTaken)}</p>
                    <p>
                      <strong>Próxima dose prevista:</strong> 
                      <span style={isOverdue(medication) ? styles.lowStock : {}}>
                        {formatDate(medication.nextDue)}
                        {isOverdue(medication) && ' (Atrasado)'}
                      </span>
                    </p>
                    
                    <div>
                      <button 
                        style={{
                          ...styles.button,
                          ...(medication.stock <= 0 ? styles.disabledButton : {})
                        }} 
                        onClick={() => openTakeMedicationModal(medication.id)}
                        disabled={medication.stock <= 0}
                      >
                        Registrar Dose
                      </button>
                      
                      <button 
                        style={{...styles.button, ...styles.warningButton}} 
                        onClick={() => openAddStockModal(medication.id)}
                      >
                        Adicionar Estoque
                      </button>
                      
                      {/* Novo botão de Editar */}
                      <button 
                        style={{...styles.button, ...styles.editButton}} 
                        onClick={() => openEditModal(medication.id)}
                      >
                        Editar
                      </button>
                      
                      <button 
                        style={{...styles.button, ...styles.dangerButton}} 
                        onClick={() => handleRemoveMedication(medication.id)}
                      >
                        Remover
                      </button>
                    </div>
                  </div>
                ))
              )}
            </div>
          )}
          
          {activeTab === 'history' && (
            <div>
              <div style={styles.historyHeader}>
                <h2>Histórico de Atividades</h2>
                {history.length > 0 && (
                  <button 
                    style={styles.clearHistoryButton}
                    onClick={() => setShowClearHistoryModal(true)}
                  >
                    Limpar Histórico
                  </button>
                )}
              </div>
              
              {/* Legenda dos ícones */}
              <div style={styles.legendContainer}>
                <h4 style={styles.legendTitle}>Legenda:</h4>
                <div style={styles.legendItems}>
                  <div style={styles.legendItem}>
                    <span style={{...styles.historyIcon, ...styles.historyIconAdd}}>➕</span>
                    <span style={styles.legendText}>Adição de medicamento</span>
                  </div>
                  <div style={styles.legendItem}>
                    <span style={{...styles.historyIcon, ...styles.historyIconTake}}>💊</span>
                    <span style={styles.legendText}>Dose tomada</span>
                  </div>
                  <div style={styles.legendItem}>
                    <span style={{...styles.historyIcon, ...styles.historyIconStock}}>📦</span>
                    <span style={styles.legendText}>Estoque adicionado</span>
                  </div>
                  <div style={styles.legendItem}>
                    <span style={{...styles.historyIcon, ...styles.historyIconRemove}}>🗑️</span>
                    <span style={styles.legendText}>Medicamento removido</span>
                  </div>
                  <div style={styles.legendItem}>
                    <span style={{...styles.historyIcon, ...styles.historyIconClear}}>🧹</span>
                    <span style={styles.legendText}>Histórico limpo</span>
                  </div>
                  <div style={styles.legendItem}>
                    <span style={{...styles.historyIcon, ...styles.historyIconEdit}}>✏️</span>
                    <span style={styles.legendText}>Medicamento editado</span>
                  </div>
                </div>
              </div>
              
              {history.length === 0 ? (
                <p>Nenhuma atividade registrada.</p>
              ) : (
                <div style={styles.historyContainer}>
                  {/* Agrupamento por data */}
                  {Object.entries(groupHistoryByDate(history)).map(([date, items]) => (
                    <div key={date} style={styles.historyDateGroup}>
                      <div style={styles.historyDateHeader}>
                        <span>{formatHistoryDate(date)}</span>
                      </div>
                      
                      {items.map(item => {
                        // Determina o tipo de atividade para mostrar ícone apropriado
                        const activityType = determineActivityType(item.message);
                        const icon = getActivityIcon(activityType);
                        
                        return (
                          <div key={item.id} style={styles.historyItem}>
                            <div style={styles.historyTime}>
                              {formatHistoryTime(item.date)}
                            </div>
                            <div style={styles.historyIconContainer}>
                              <span style={{...styles.historyIcon, ...styles[`historyIcon${activityType}`]}}>
                                {icon}
                              </span>
                            </div>
                            <div style={styles.historyContent}>
                              {formatHistoryMessage(item.message)}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
          
          {/* Modal para adicionar estoque */}
          {showStockModal && (
            <div className="modal-backdrop fadeIn">
              <div className="modal-content">
                <div className="modal-header">
                  <h3>Adicionar Estoque</h3>
                </div>
                <div>
                  <label htmlFor="stockAmount">Quantidade a adicionar:</label>
                  <input
                    id="stockAmount"
                    type="number"
                    style={styles.input}
                    value={stockAmount}
                    onChange={(e) => setStockAmount(e.target.value)}
                    placeholder="Digite a quantidade"
                    min="0.5"
                    step="0.5"
                    autoFocus
                  />
                </div>
                <div className="modal-footer">
                  <button 
                    style={{...styles.modalButton, ...styles.modalCancelButton}} 
                    onClick={() => setShowStockModal(false)}
                  >
                    Cancelar
                  </button>
                  <button 
                    style={styles.modalButton} 
                    onClick={handleAddStock}
                  >
                    Confirmar
                  </button>
                </div>
              </div>
            </div>
          )}
          
          {/* Modal para seleção de dose (manhã/noite) */}
          {showDoseModal && (
            <div className="modal-backdrop fadeIn">
              <div className="modal-content">
                <div className="modal-header">
                  <h3>Registrar Dose</h3>
                </div>
                <div>
                  <p>Selecione o horário da dose:</p>
                  <div style={{display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap'}}>
                    <div
                      style={{
                        ...styles.doseTimeButton,
                        ...(selectedDoseTime === 'morning' ? styles.selectedDoseTimeButton : {})
                      }}
                      onClick={() => setSelectedDoseTime('morning')}
                    >
                      Dose da Manhã
                    </div>
                    <div
                      style={{
                        ...styles.doseTimeButton,
                        ...(selectedDoseTime === 'evening' ? styles.selectedDoseTimeButton : {})
                      }}
                      onClick={() => setSelectedDoseTime('evening')}
                    >
                      Dose da Noite
                    </div>
                  </div>
                  
                  {/* Campo para horário retroativo */}
                  <div style={{marginTop: '15px'}}>
                    <label htmlFor="customDoseTime" style={{display: 'block', marginBottom: '5px'}}>
                      Hora que foi tomado: <span style={{fontSize: '13px', color: '#666'}}>(opcional)</span>
                    </label>
                    <input
                      id="customDoseTime"
                      type="datetime-local"
                      style={styles.input}
                      value={customDoseTime}
                      onChange={(e) => setCustomDoseTime(e.target.value)}
                      max={new Date().toISOString().slice(0, 16)}
                    />
                    <p style={{fontSize: '13px', color: '#666', margin: '5px 0 0 0'}}>
                      Se não preenchido, será considerado o horário atual.
                    </p>
                  </div>
                </div>
                <div className="modal-footer">
                  <button 
                    style={{...styles.modalButton, ...styles.modalCancelButton}} 
                    onClick={() => setShowDoseModal(false)}
                  >
                    Cancelar
                  </button>
                  <button 
                    style={{
                      ...styles.modalButton,
                      ...(selectedDoseTime === '' ? styles.disabledButton : {})
                    }} 
                    onClick={() => handleTakeMedication(selectedMedicationId, selectedDoseTime, customDoseTime)}
                    disabled={selectedDoseTime === ''}
                  >
                    Confirmar
                  </button>
                </div>
              </div>
            </div>
          )}
          
          {/* Modal para confirmação de limpar histórico */}
          {showClearHistoryModal && (
            <div className="modal-backdrop fadeIn">
              <div className="modal-content">
                <div className="modal-header">
                  <h3>Limpar Histórico</h3>
                </div>
                <div>
                  <p>Tem certeza que deseja limpar todo o histórico de atividades?</p>
                  <p>Esta ação não pode ser desfeita.</p>
                </div>
                <div className="modal-footer">
                  <button 
                    style={{...styles.modalButton, ...styles.modalCancelButton}} 
                    onClick={() => setShowClearHistoryModal(false)}
                  >
                    Cancelar
                  </button>
                  <button 
                    style={{...styles.modalButton, ...styles.dangerButton}}
                    onClick={handleClearHistory}
                  >
                    Limpar Histórico
                  </button>
                </div>
              </div>
            </div>
          )}
          
          {/* NOVO Modal para editar medicamento */}
          {showEditModal && editingMedication && (
            <div className="modal-backdrop fadeIn">
              <div className="modal-content" style={{maxWidth: '500px'}}>
                <div className="modal-header">
                  <h3>Editar Medicamento</h3>
                </div>
                <div>
                  <div>
                    <label htmlFor="editName">Nome do Medicamento</label>
                    <input
                      id="editName"
                      type="text"
                      style={styles.input}
                      value={editingMedication.name}
                      onChange={(e) => setEditingMedication({...editingMedication, name: e.target.value})}
                      placeholder="Ex: Paracetamol"
                      required
                    />
                  </div>
                  
                  <div>
                    <label htmlFor="editDosage">Dosagem</label>
                    <input
                      id="editDosage"
                      type="text"
                      style={styles.input}
                      value={editingMedication.dosage}
                      onChange={(e) => setEditingMedication({...editingMedication, dosage: e.target.value})}
                      placeholder="Ex: 500mg, 1 comprimido"
                      required
                    />
                  </div>
                  
                  <div style={{marginTop: '15px', marginBottom: '15px'}}>
                    <label style={{fontWeight: 'bold'}}>Tipo de Programação</label>
                    <div style={{display: 'flex', marginTop: '8px', gap: '10px'}}>
                      <label style={{display: 'flex', alignItems: 'center', cursor: 'pointer'}}>
                        <input
                          type="radio"
                          name="editScheduleType"
                          checked={!editingMedication.customSchedule}
                          onChange={() => setEditingMedication({...editingMedication, customSchedule: false})}
                        />
                        <span style={{marginLeft: '8px'}}>Padrão (frequência regular)</span>
                      </label>
                      <label style={{display: 'flex', alignItems: 'center', cursor: 'pointer'}}>
                        <input
                          type="radio"
                          name="editScheduleType"
                          checked={editingMedication.customSchedule}
                          onChange={() => setEditingMedication({...editingMedication, customSchedule: true})}
                        />
                        <span style={{marginLeft: '8px'}}>Personalizado (manhã/noite)</span>
                      </label>
                    </div>
                  </div>
                  
                  {!editingMedication.customSchedule ? (
                    <div>
                      <label htmlFor="editFrequency">Frequência</label>
                      <input
                        id="editFrequency"
                        type="text"
                        style={styles.input}
                        value={editingMedication.frequency}
                        onChange={(e) => setEditingMedication({...editingMedication, frequency: e.target.value})}
                        placeholder="Ex: 8 horas, 1 dia, 1 semana"
                        required={!editingMedication.customSchedule}
                      />
                    </div>
                  ) : (
                    <div style={{border: '1px solid var(--primary-light)', borderRadius: '5px', padding: '10px', marginBottom: '15px'}}>
                      <p style={{marginTop: '0', marginBottom: '10px', fontWeight: 'bold'}}>Programação Diária (a cada 12 horas)</p>
                      
                      <div>
                        <label htmlFor="editMorningDose">Dose da Manhã (comprimidos)</label>
                        <input
                          id="editMorningDose"
                          type="number"
                          style={styles.input}
                          value={editingMedication.morningDose}
                          onChange={(e) => setEditingMedication({...editingMedication, morningDose: parseFloat(e.target.value) || 0})}
                          min="0"
                          step="0.5"
                        />
                      </div>
                      
                      <div>
                        <label htmlFor="editEveningDose">Dose da Noite (comprimidos)</label>
                        <input
                          id="editEveningDose"
                          type="number"
                          style={styles.input}
                          value={editingMedication.eveningDose}
                          onChange={(e) => setEditingMedication({...editingMedication, eveningDose: parseFloat(e.target.value) || 0})}
                          min="0"
                          step="0.5"
                        />
                      </div>
                    </div>
                  )}
                  
                  <div>
                    <label htmlFor="editAlertThreshold">Alerta de Estoque Baixo</label>
                    <input
                      id="editAlertThreshold"
                      type="number"
                      style={styles.input}
                      value={editingMedication.alertThreshold}
                      onChange={(e) => setEditingMedication({...editingMedication, alertThreshold: parseFloat(e.target.value) || 0})}
                      min="0.5"
                      step="0.5"
                    />
                  </div>
                </div>
                <div className="modal-footer">
                  <button 
                    style={{...styles.modalButton, ...styles.modalCancelButton}} 
                    onClick={() => setShowEditModal(false)}
                  >
                    Cancelar
                  </button>
                  <button 
                    style={styles.modalButton} 
                    onClick={handleSaveEdit}
                  >
                    Salvar Alterações
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Renderizar o App no elemento root
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
